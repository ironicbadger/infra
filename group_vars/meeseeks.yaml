---
# ironicbadger.docker-compose-generator
host_timezone: "America/New_York"
docker_compose_hostname: "meeseeks"

appdata_path: /mnt/nvmeu2/appdata
download_path: /mnt/downloads
storage_path: /mnt/rust

docker_compose_generator_uid: "1000"
docker_compose_generator_gid: "1000"
docker_compose_generator_zfs_enabled: true

# Docker containers need local DNS; the host resolver is Tailscale-managed.
docker_daemon_config:
  dns:
    - "10.42.0.53"
docker_daemon_disable_apparmor: true

# zrepl configuration - carried forward from the old c137 jobs
zrepl_targets:
  igloo: "100.91.74.29:27808"
  snowball: "100.88.250.125:27809"

zrepl_jobs:
  # Push appdata to igloo
  - name: "igloo_appdata"
    type: push
    connect:
      type: "tcp"
      address: "{{ zrepl_targets.igloo }}"
    filesystems:
      "nvmeu2/appdata<": true
    send:
      encrypted: false
    snapshotting:
      type: "periodic"
      prefix: "zrepl_igloo_"
      interval: "60m"
    pruning:
      keep_sender:
        - type: "not_replicated"
      keep_receiver:
        - type: "regex"
          negate: true
          regex: "^zrepl_igloo_"
        - type: "grid"
          grid: "1x1h(keep=all) | 24x1h | 7x1d | 2x30d"
          regex: "^zrepl_igloo_"

  # Push data to igloo
  - name: "igloo_data"
    type: push
    connect:
      type: "tcp"
      address: "{{ zrepl_targets.igloo }}"
    filesystems:
      "rust/data<": true
    send:
      encrypted: false
    snapshotting:
      type: "periodic"
      prefix: "zrepl_data_"
      interval: "60m"
    pruning:
      keep_sender:
        - type: "not_replicated"
      keep_receiver:
        - type: "regex"
          negate: true
          regex: "^zrepl_data_"
        - type: "grid"
          grid: "1x1h(keep=all) | 24x1h | 7x1d | 2x30d"
          regex: "^zrepl_data_"

  # Push media to igloo, excluding movies and tv
  - name: "igloo_media"
    type: push
    connect:
      type: "tcp"
      address: "{{ zrepl_targets.igloo }}"
    filesystems:
      "rust/media<": true
      "rust/media/movies<": false
      "rust/media/tv<": false
    send:
      encrypted: false
    snapshotting:
      type: "periodic"
      prefix: "zrepl_media_"
      interval: "60m"
    pruning:
      keep_sender:
        - type: "not_replicated"
      keep_receiver:
        - type: "regex"
          negate: true
          regex: "^zrepl_media_"
        - type: "grid"
          grid: "1x1h(keep=all) | 24x1h | 7x1d | 2x30d"
          regex: "^zrepl_media_"

  # Push photos to igloo
  - name: "igloo_photos"
    type: push
    connect:
      type: "tcp"
      address: "{{ zrepl_targets.igloo }}"
    filesystems:
      "rust/photos<": true
    send:
      encrypted: false
    snapshotting:
      type: "periodic"
      prefix: "zrepl_photos_"
      interval: "60m"
    pruning:
      keep_sender:
        - type: "not_replicated"
      keep_receiver:
        - type: "regex"
          negate: true
          regex: "^zrepl_photos_"
        - type: "grid"
          grid: "1x1h(keep=all) | 24x1h | 7x1d | 2x30d"
          regex: "^zrepl_photos_"

  # Push video to igloo
  - name: "igloo_video"
    type: push
    connect:
      type: "tcp"
      address: "{{ zrepl_targets.igloo }}"
    filesystems:
      "rust/video<": true
    send:
      encrypted: false
    snapshotting:
      type: "periodic"
      prefix: "zrepl_video_"
      interval: "60m"
    pruning:
      keep_sender:
        - type: "not_replicated"
      keep_receiver:
        - type: "regex"
          negate: true
          regex: "^zrepl_video_"
        - type: "grid"
          grid: "1x1h(keep=all) | 24x1h | 7x1d | 2x30d"
          regex: "^zrepl_video_"

  # Push appdata to snowball
  - name: "snowball_appdata"
    type: push
    connect:
      type: "tcp"
      address: "{{ zrepl_targets.snowball }}"
    filesystems:
      "nvmeu2/appdata<": true
    send:
      encrypted: false
    snapshotting:
      type: "periodic"
      prefix: "zrepl_snowball_"
      interval: "60m"
    pruning:
      keep_sender:
        - type: "not_replicated"
      keep_receiver:
        - type: "regex"
          negate: true
          regex: "^zrepl_snowball_"
        - type: "grid"
          grid: "1x1h(keep=all) | 24x1h | 7x1d | 2x30d"
          regex: "^zrepl_snowball_"

zrepl_monitoring:
  - type: "prometheus"
    listen: ":9811"
