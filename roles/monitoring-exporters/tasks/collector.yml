---
- name: Install Debian monitoring packages on {{ monitoring_collector.name }}
  ansible.builtin.apt:
    name:
      - prometheus-node-exporter
      - smartmontools
      - ethtool
      - python3
    state: present
    update_cache: true
    cache_valid_time: 3600
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when:
    - monitoring_collector.package_manager == 'apt'
    - monitoring_collector.install_node_exporter | default(true) | bool

- name: Install Arch monitoring packages on {{ monitoring_collector.name }}
  community.general.pacman:
    name:
      - prometheus-node-exporter
      - smartmontools
      - ethtool
      - python
    state: present
    update_cache: true
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when:
    - monitoring_collector.package_manager == 'pacman'
    - monitoring_collector.install_node_exporter | default(true) | bool

- name: Install Intel GPU tools on {{ monitoring_collector.name }}
  ansible.builtin.apt:
    name:
      - intel-gpu-tools
    state: present
    update_cache: true
    cache_valid_time: 3600
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when:
    - monitoring_collector.package_manager == 'apt'
    - monitoring_collector.install_intel_gpu_textfile | default(false) | bool

- name: Ensure node_exporter textfile directory exists on {{ monitoring_collector.name }}
  ansible.builtin.file:
    path: "{{ monitoring_node_exporter_textfile_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when: monitoring_collector.install_node_exporter | default(true) | bool

- name: Ensure node_exporter systemd override directory exists on {{ monitoring_collector.name }}
  ansible.builtin.file:
    path: /etc/systemd/system/prometheus-node-exporter.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when: monitoring_collector.install_node_exporter | default(true) | bool

- name: Configure node_exporter collectors on {{ monitoring_collector.name }}
  ansible.builtin.template:
    src: prometheus-node-exporter-override.conf.j2
    dest: /etc/systemd/system/prometheus-node-exporter.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  register: monitoring_node_exporter_override
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when: monitoring_collector.install_node_exporter | default(true) | bool

- name: Restart node_exporter when config changes on {{ monitoring_collector.name }}
  ansible.builtin.systemd_service:
    name: prometheus-node-exporter
    daemon_reload: true
    enabled: true
    state: restarted
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when:
    - monitoring_collector.install_node_exporter | default(true) | bool
    - monitoring_node_exporter_override.changed

- name: Ensure node_exporter is running on {{ monitoring_collector.name }}
  ansible.builtin.systemd_service:
    name: prometheus-node-exporter
    enabled: true
    state: started
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when: monitoring_collector.install_node_exporter | default(true) | bool

- name: Install SMART textfile script on {{ monitoring_collector.name }}
  ansible.builtin.template:
    src: node-smart-textfile.py.j2
    dest: /usr/local/sbin/node-smart-textfile
    owner: root
    group: root
    mode: "0755"
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when: monitoring_collector.install_smart_textfile | default(false) | bool

