  when: monitoring_collector.install_smart_textfile | default(false) | bool

- name: Run SMART textfile collector once on {{ monitoring_collector.name }}
  ansible.builtin.systemd_service:
    name: node-smart-textfile.service
    state: started
  changed_when: false
  delegate_to: "{{ monitoring_collector.inventory_hostname }}"
  when: monitoring_collector.install_smart_textfile | default(false) | bool

