services:
  tr:
    image: traefik
    container_name: tr
    volumes:
      - "{{ appdata_path }}/apps/traefik/letsencrypt:/letsencrypt"
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Lets Traefik route to services using network_mode: host, e.g. bambuddy.
    extra_hosts:
      - host.docker.internal:host-gateway
    labels:
      - traefik.enable=false
    security_opt:
      - apparmor:unconfined
    ports:
      - 80:80
      - 443:443
    environment:
      - CF_DNS_API_TOKEN={{ vault_cloudflare_dns_api_token }}
    command:
      - --log.level=info
      - --accesslog=false
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.certresolver=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email={{ vault_cloudflare_account_email }}
      - --certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json
      - --serversTransport.insecureSkipVerify=true
    restart: unless-stopped
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    labels:
      - traefik.enable=true
      - "traefik.http.routers.dockhand.rule=Host(`dockhand.{{ m_wd_domain_me }}`)"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "{{ appdata_path }}/apps/dockhand:/app/data"
    restart: unless-stopped