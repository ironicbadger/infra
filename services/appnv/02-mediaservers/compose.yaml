services:
## media servers
  # plex
  # jellyfin
  # both require qsv so are on the host natively
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    volumes:
      - "{{ appdata_path }}/mediaservers/audiobookshelf:/config"
      - "/mnt/rust/media/audiobooks:/audiobooks"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.audiobookshelf.rule=Host(`audiobooks.wd.ktz.me`)"
      - traefik.http.services.audiobookshelf.loadbalancer.server.port=80
    environment:
      - "PUID={{ docker_compose_generator_uid }}"
      - "PGID={{ docker_compose_generator_gid }}"
      - "TZ={{ host_timezone }}"
    restart: unless-stopped
  storyteller:
    image: registry.gitlab.com/storyteller-platform/storyteller:latest-cuda-13.1.0
    container_name: storyteller
    runtime: nvidia
    mem_limit: 16g
    cpus: "8.0"
    volumes:
      - "{{ appdata_path }}/mediaservers/storyteller/data:/data:rw"
      - "{{ appdata_path }}/mediaservers/storyteller/config:/config:ro"
      - "{{ storage_path }}/media/books:/books:ro"
      - "{{ storage_path }}/media/audiobooks:/audiobooks:ro"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.storyteller.rule=Host(`storyteller.{{ m_wd_domain_me }}`)"
      - traefik.http.services.storyteller.loadbalancer.server.port=8001
    environment:
      - STORYTELLER_SECRET_KEY_FILE=/data/STORYTELLER_SECRET_KEY.txt
      - STORYTELLER_CONFIG=/config/storyteller.json
      - "PUID={{ docker_compose_generator_uid }}"
      - "PGID={{ docker_compose_generator_gid }}"
      - "TZ={{ host_timezone }}"
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: "{{ docker_compose_generator_uid }}:{{ docker_compose_generator_gid }}"
    volumes:
      - "{{ appdata_path }}/mediaservers/navidrome:/data"
      - "/mnt/rust/media/music/library:/music:ro"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.navidrome.rule=Host(`navidrome.{{ m_wd_domain_me }}`)"
      - traefik.http.services.navidrome.loadbalancer.server.port=4533
    environment:
      - ND_MUSICFOLDER=/music
      - ND_DEVFASTACCESSCOVERART=true
      - ND_COVERARTPRIORITY=embedded
      - "TZ={{ host_timezone }}"
    restart: unless-stopped
  cwa:
    image: crocodilestick/calibre-web-automated:latest
    container_name: cwa
    labels:
      - traefik.enable=true
      - "traefik.http.routers.cwa.rule=Host(`cwa.{{ m_wd_domain_me }}`)"
      - traefik.http.routers.cwa.entrypoints=websecure
      - traefik.http.routers.cwa.tls=true
      - traefik.http.services.cwa.loadbalancer.server.port=8083
      - traefik.http.middlewares.cwa-headers.headers.customRequestHeaders.X-Scheme=https
      - traefik.http.middlewares.cwa-headers.headers.customRequestHeaders.X-Forwarded-Proto=https
      - traefik.http.middlewares.cwa-headers.headers.customRequestHeaders.X-Forwarded-Port=443
      - traefik.http.routers.cwa.middlewares=cwa-headers
    environment:
      - "PUID={{ docker_compose_generator_uid }}"
      - "PGID={{ docker_compose_generator_gid }}"
      - "TZ={{ host_timezone }}"
      # Hardcover API Key required for Hardcover as a Metadata Provider, get one here: https://docs.hardcover.app/api/getting-started/
      - "HARDCOVER_TOKEN={{ cwa_hardcover_api_token }}"
      - NETWORK_SHARE_MODE=false
      # appnv serves these paths from VM/bind mounts; polling avoids missed ingest events.
      - CWA_WATCH_MODE=poll
    volumes:
      - "{{ appdata_path }}/mediaservers/calibre-web/config:/config"
      # Shared Shelfmark/SAB drop zone. CWA imports files from here, then removes them.
      - "{{ download_path }}/complete/books:/cwa-book-ingest"
      #- "{{ appdata_path }}/mediaservers/calibre-web/book-ingest:/cwa-book-ingest"
      # Managed Calibre library. Imported books end up on the host at /mnt/rust/media/books.
      - "{{ storage_path }}/media/books:/calibre-library"
      - "{{ appdata_path }}/mediaservers/calibre-web/calibre-plugins:/config/.config/calibre/plugins"
    restart: unless-stopped
