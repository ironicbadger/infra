services:
  bitflip-patreon-bot:
    image: "{{ bitflip_patreon_bot_image }}"
    container_name: bitflip-patreon-bot
    env_file:
      - "{{ appdata_path }}/bitflip-patreon-bot/env/patreon-discord-bot.env"
    volumes:
      - "{{ appdata_path }}/bitflip-patreon-bot/data:/data"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.bitflip-patreon-bot.rule=Host(`{{ bitflip_patreon_bot_hostname }}`)"
      - traefik.http.routers.bitflip-patreon-bot.entrypoints=websecure
      - traefik.http.routers.bitflip-patreon-bot.tls.certresolver=cloudflare
      - traefik.http.services.bitflip-patreon-bot.loadbalancer.server.port=3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
