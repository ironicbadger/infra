---
  - hosts: caddy
    roles:
      - role: ironicbadger.figurine
      - role: ironicbadger.tailscale-routes-fix
      - role: ironicbadger.caddy
        tags: caddy

### SERVERS
  - hosts: appnv
    roles:
      #- role: ironicbadger.figurine
      #- role: ktz-server-welcome
      #- role: ironicbadger.tailscale-routes-fix
      #- role: ironicbadger.packages
      - role: ironicbadger.docker-compose-generator
        tags: compose

  - hosts: meeseeks
    roles:
      - role: ironicbadger.figurine
      - role: ktz-server-welcome
      - role: zrepl
        tags: zrepl
      - role: docker-daemon
        tags:
          - compose
          - docker
      - role: ironicbadger.docker-compose-generator
        tags: compose
      - role: jellyfin-discovery
        tags:
          - compose
          - jellyfin-discovery

  - hosts: monitoring
    roles:
      - role: monitoring-exporters
        tags:
          - monitoring
      - role: ironicbadger.docker-compose-generator
        tags:
          - compose
          - monitoring
      - role: docker-compose-up
        tags:
          - compose
          - monitoring

### LXCs
  - hosts: immich-app
    vars:
      docker_compose_hostname: lxc-immich-app
      appdata_path: /mnt/appdata
    roles:
      - role: ironicbadger.figurine
      - role: ironicbadger.docker-compose-generator
        tags: compose

  - hosts: immich-ml
    vars:
      docker_compose_hostname: lxc-immich-ml
    roles:
      - role: ironicbadger.figurine
      - role: ironicbadger.docker-compose-generator
        tags: compose

  - hosts: ollama
    vars:
      docker_compose_hostname: lxc-ollama
      appdata_path: /mnt/appdata
    roles:
      - role: ironicbadger.figurine
      - role: ironicbadger.docker-compose-generator
        tags: compose


# EXTERNAL
